<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="160" y1="80" x2="1040" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#24E0C9" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#3C6BFF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#F03BFF" stop-opacity="0.70"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Links (toned down) -->
  <path d="M160 210 C 320 120, 460 120, 560 170 C 650 215, 770 280, 1040 160" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <path d="M160 210 C 320 300, 460 310, 600 260 C 760 205, 860 210, 1040 300" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" opacity="0.38"/>
  <path d="M560 170 C 640 130, 760 120, 840 150" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <path d="M600 260 C 700 300, 820 320, 1040 300" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" opacity="0.30"/>

  <!-- Nodes -->
  <g filter="url(#softGlow)">
    <circle cx="160" cy="210" r="14" fill="#070935" stroke="#24E0C9" stroke-width="4" opacity="0.95"/>
    <circle cx="560" cy="170" r="12" fill="#070935" stroke="#3C6BFF" stroke-width="4" opacity="0.88"/>
    <circle cx="600" cy="260" r="12" fill="#070935" stroke="#F03BFF" stroke-width="4" opacity="0.82"/>
    <circle cx="840" cy="150" r="10" fill="#070935" stroke="#24E0C9" stroke-width="4" opacity="0.78"/>
    <circle cx="1040" cy="160" r="14" fill="#070935" stroke="#3C6BFF" stroke-width="4" opacity="0.88"/>
    <circle cx="1040" cy="300" r="14" fill="#070935" stroke="#F03BFF" stroke-width="4" opacity="0.78"/>
  </g>

  <!-- Labels (optional; remove if you want pure visual) -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#E9EEFF" opacity="0.78">
    <text x="140" y="250">Input</text>
    <text x="520" y="145">Route</text>
    <text x="570" y="305">Skill</text>
    <text x="820" y="125">Branch</text>
    <text x="1000" y="135">Output A</text>
    <text x="1000" y="335">Output B</text>
  </g>
</svg>
